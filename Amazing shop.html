<!DOCTYPE html>
<html>
    <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=devide-width,initial-scale=1.0">
        <title>Amazing Shop</title>
     
        <style>
            body{
                background-image: url(bg\ amazing\ color.jpg);
                background-repeat: no-repeat;
                background-attachment: fixed;
                background-size: 100%;
             }
             .hearder{
               padding: 0.1px;
               background-color:deepskyblue;
             }
             .navbar{
               display: flex;
               position: sticky;
               text-shadow: 100px;
               box-sizing: border-box;
               padding-left:20px;
               padding-right: 30px;
               align-items: center;
               font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
               justify-content: space-around; 
               top: 0;
               gap: 540px;
               
             }
            

             .navbar a{
               color: rgb(68, 7, 53);
               padding: 15px 20px;
               text-decoration: none;
               text-align: center;
         
            
             }
             .navbar a:hover{
               background-color:hotpink;
               color:rgb(3, 58, 76);
             }
             .thrill{
              font-family:Georgia, 'Times New Roman', Times, serif;
              font-style: italic;
              color: rgb(171, 38, 109);
              font-weight: 400px;
             }
             .purchase{
              font-family: Verdana, Geneva, Tahoma, sans-serif;
              color: white;
              background-color: rgb(209, 0, 111) ;
              text-decoration: none;
              border-radius: 10px;
              padding: 10px 20px;
              text-align: center;
              display: inline-block;
             }
             .purchase:hover{
              box-shadow: 0 0 10px 3px rgb(12, 82, 107);
              border-radius: 5px;
               }

            
            .arrange {
                  display: flex;
              
                 }

            .main-column {
                        flex: 1;
                        min-width: 500px;
                        padding: 100px;
                      }
              .sidebar{
                        flex: 1;
                        min-width: 500px;
                        padding: 50px;
              }        
             .create{
               color:rgb(0, 135, 180);
              text-align:left;
               text-shadow: 3px 3px;
               font-family:Verdana, Geneva, Tahoma, sans-serif;
               text-transform: capitalize;
               font-weight:900;
               font-size: 1.5cm;
               word-spacing: 1px;
               corner-top-right-shape: 200px;
             }
             .with{
              color: rgb(66, 82, 82);
              font-size: larger;
              font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
              padding-bottom: 20px;

             }
             .button{
              font-family: Verdana, Geneva, Tahoma, sans-serif;
              color: white;
              background-color: rgb(209, 0, 111) ;
              text-decoration: none;
              border-radius: 10px;
              padding: 10px 20px;
              text-align: center;
              display: inline-block;
             }
             a.button:hover{
              box-shadow: 0 0 5px 3px rgb(64, 192, 227);
               }
               .browse{
                color:rgb(0, 135, 180);
                text-decoration: dotted;
                padding-left: 25px;
               }
               .browse:hover{
                text-decoration: underline;
                color: blueviolet;
               }
             .image-container{
              position: relative;
              width: 400px;
              height: 300px;
             }
              .blog{
                corner-top-left-shape: 50px;
                top: 60px;
                right: 10px;
                 width: 600px;
                height: 400px;
                border-radius: 20px;
              object-fit: cover;
              position: absolute;
             }
             

             .colors{
               position:relative;
              corner-top-right-shape: 50px;
              top: 40px;
              left: 140px;
               width: 300px;
               height: 200px;
               border-radius: 10px;
               z-index: 2;
             }
             .Rating{
              corner-bottom-right-shape: 5px;
             bottom: 30px;
                 width: 320px;
                height: 180px;
                border-radius: 10px;
                position:relative;
             }
             
             .Timage{
              corner-bottom-left-shape: 300px;
              top: 200px;
              right: 200px;
                width: 200px;
                height: 200px;
              position:relative;
              z-index: 2;
            }
             </style>
        
    </head>
    <body>
        
        <div class="hearder">
           <div class="navbar">
             <h2 class="thrill">Thrilley...</h2>
             <div class="color">
                <a href="Amazing shop.html">Intro</a>
                <a href="#">Demos</a>
                <a href="#">Portfolio</a>
                <a href="#">Shop</a>
                <a href="#">Blog</a>
                <a href="#">Documentation</a>
                <b class="purchase" href="#" target="_blank" >Purchase $#$</b>
              </div>
            </div>
         </div>
         <div class="arrange">
         <div class="main-column">
           <p class="create">Create Your<br>Amazing Shop</p>
           <p class="with">With Thrilley, The ultimate multipurpose <br> creative wordpress theme</p>
          <a class="button" href="#" target="-blank">GET THRILLEY NOW</a>
          <a class="browse" href="#" target="-blank">BROWSE DEMOS</a>
         </div>
           
         <div class="side-bar">
            <link rel="stylesheet" href="./Amazing.css">
            <div class="image-container">
            <img src="colors.png" class="colors" alt="colors" >
            <img src="Timage.png" class="Timage" alt="Timage">
            <img src="blogg.png" class="blog" alt="blog">
            <img src="Rating.png" class="Rating" alt="Rating">
         </div>
         </div>
         </div>

    </body>
</html>
